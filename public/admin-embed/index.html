<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Chống Google index trang này -->
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>LHT Product Manager Embed</title>
  <meta name="description" content="Quản lý sản phẩm và dịch vụ - Hệ thống quản trị Linh Hoa Tâm">
  <meta property="og:title" content="LHT Product Manager Embed">
  <meta property="og:description" content="Quản lý sản phẩm và dịch vụ - Hệ thống quản trị Linh Hoa Tâm">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            title: ['Outfit', 'sans-serif'],
          },
          colors: {
            'oxford-blue': '#002b57',
            'blaze-orange': '#ff5a00',
            'cyan-azure': '#0084ff',
            'ice-white': '#f5f7fa',
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
    }
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden flex flex-col p-0">
  <div class="w-full h-full bg-white overflow-hidden flex flex-col flex-grow">
    <!-- Header -->
    <div class="bg-gradient-to-r from-oxford-blue to-[#004080] p-6 text-white flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-title font-bold tracking-tight">QUẢN LÝ SẢN PHẨM & DỊCH VỤ</h1>
        <p class="text-xs text-slate-300 mt-1 font-medium">Bản nâng cấp giao diện quản trị chuyên nghiệp cho Linh Hoa Tâm</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="sync-status" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/20 text-emerald-300">
          <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
          Đã đồng bộ NocoBase
        </span>
      </div>
    </div>

    <!-- Main Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-0 flex-grow overflow-hidden">
      <!-- Left Sidebar: Product List -->
      <div class="lg:col-span-5 border-r border-slate-200 p-5 bg-slate-50/50 flex flex-col h-full overflow-hidden">
        <div class="flex bg-slate-200/70 p-1 rounded-xl mb-4">
          <button onclick="switchTab('personal')" id="tab-btn-personal" class="flex-1 py-2 px-3 rounded-lg text-sm font-semibold transition-all duration-200 bg-white text-oxford-blue shadow-sm">
            👤 Cá nhân
          </button>
          <button onclick="switchTab('business')" id="tab-btn-business" class="flex-1 py-2 px-3 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-oxford-blue">
            🏢 Doanh nghiệp
          </button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-1" id="product-list">
          <div class="p-8 text-center text-slate-400 text-sm">Đang tải danh sách sản phẩm...</div>
        </div>

        <button onclick="initNewProduct()" class="w-full mt-4 bg-oxford-blue hover:bg-oxford-blue/90 text-white font-semibold py-2.5 px-4 rounded-xl text-sm flex items-center justify-center gap-2 transition-all duration-200 active:scale-[0.98]">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" /></svg>
          Thêm sản phẩm mới
        </button>
      </div>

      <!-- Right Panel: Editor Form -->
      <div class="lg:col-span-7 p-6 flex flex-col bg-white overflow-y-auto h-full custom-scroll" id="editor-panel">
        <div class="flex-1 flex flex-col justify-center items-center text-slate-400 py-20" id="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
          <p class="font-medium text-slate-500 text-center px-6">Chọn một sản phẩm từ danh sách bên trái hoặc thêm mới để bắt đầu chỉnh sửa</p>
        </div>

        <form id="product-form" class="hidden space-y-5" onsubmit="saveProduct(event)">
          <input type="hidden" id="form-id">
          
          <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Tên sản phẩm *</label>
              <input type="text" id="form-name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue font-medium">
            </div>

            <!-- Product Image Upload Slot -->
            <div class="col-span-2 bg-slate-50 p-4 rounded-xl border border-slate-200 flex items-center gap-4">
              <div class="w-20 h-20 bg-slate-200 rounded-lg overflow-hidden border border-slate-300 flex items-center justify-center shrink-0 relative" id="image-preview-container">
                <span class="text-[10px] text-slate-400 font-bold uppercase text-center p-1">Chưa có hình</span>
              </div>
              <div class="flex-grow">
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Hình ảnh sản phẩm</label>
                <p class="text-[10px] text-slate-400 mb-2">Khuyến nghị: Định dạng vuông (e.g. 800x800 px) hoặc 4:3, PNG/JPG</p>
                <div class="flex items-center gap-2">
                  <input type="file" id="image-file-input" onchange="uploadProductImage(event)" class="hidden" accept="image/*">
                  <button type="button" onclick="document.getElementById('image-file-input').click()" class="px-3 py-1.5 bg-white border border-slate-300 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                    Tải ảnh lên
                  </button>
                  <button type="button" onclick="clearProductImage()" id="btn-clear-image" class="hidden px-3 py-1.5 text-xs font-bold text-rose-500 hover:text-rose-600 bg-rose-50 rounded-lg transition-colors">
                    Xóa ảnh
                  </button>
                </div>
                <input type="hidden" id="form-image-id">
              </div>
            </div>
            
            <div>
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Giá hiển thị</label>
              <input type="text" id="form-price" placeholder="Ví dụ: 450.000 VND" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue font-medium">
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Nhãn nổi bật (Badge)</label>
              <input type="text" id="form-badge" placeholder="Ví dụ: ĐẦY ĐỦ NHẤT" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue font-medium">
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Tagline (Dòng phụ)</label>
              <input type="text" id="form-tagline" placeholder="Ví dụ: Dành cho CEO & Founder" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue">
            </div>

            <div>
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Slug URL</label>
              <input type="text" id="form-slug" placeholder="Ví dụ: ban-do-chien-luoc" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue font-mono text-xs">
            </div>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Mô tả ngắn</label>
            <textarea id="form-description" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue"></textarea>
          </div>

          <!-- Smart Benefits Manager -->
          <div>
            <label class="block text-xs font-bold text-slate-600 uppercase mb-1 flex justify-between items-center">
              <span>Quyền lợi & Tính năng sản phẩm</span>
              <button type="button" onclick="addBenefitRow('')" class="text-xs text-cyan-azure hover:text-cyan-azure/80 font-bold flex items-center gap-1">
                + Thêm dòng
              </button>
            </label>
            <div id="benefits-container" class="space-y-2 max-h-[160px] overflow-y-auto custom-scroll p-1.5 border border-dashed border-slate-200 rounded-lg bg-slate-50/50">
              <!-- dynamic rows -->
            </div>
          </div>

          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Nút CTA</label>
              <input type="text" id="form-cta-label" placeholder="Đặt lịch ngay" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Giao diện (Theme)</label>
              <select id="form-theme" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue">
                <option value="light">Sáng (Nền trắng/xám)</option>
                <option value="dark">Tối (Nền xanh đậm)</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Thứ tự hiển thị</label>
              <input type="number" id="form-sort-order" value="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-oxford-blue/20 focus:border-oxford-blue font-medium">
            </div>
          </div>

          <div class="flex items-center gap-4 pt-3 border-t border-slate-100">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" id="form-featured" class="rounded text-oxford-blue focus:ring-oxford-blue">
              <span class="text-xs font-bold text-slate-600 uppercase">Sản phẩm nổi bật</span>
            </label>
          </div>

          <!-- Buttons -->
          <div class="flex items-center justify-end gap-3 pt-2">
            <button type="button" id="btn-delete" onclick="deleteCurrentProduct()" class="mr-auto hidden text-xs text-rose-500 hover:text-rose-600 font-bold flex items-center gap-1.5 bg-rose-50 hover:bg-rose-100/70 px-3 py-2 rounded-lg transition-all duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
              Xóa sản phẩm
            </button>
            <button type="button" onclick="cancelEdit()" class="px-4 py-2 border border-slate-300 rounded-xl text-slate-600 hover:bg-slate-50 font-semibold text-sm transition-all duration-200">
              Hủy
            </button>
            <button type="submit" class="px-6 py-2 bg-blaze-orange hover:bg-blaze-orange/95 active:scale-[0.98] text-white font-bold rounded-xl text-sm transition-all duration-200 flex items-center gap-2 shadow-sm">
              Lưu thay đổi
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsInJvbGVOYW1lIjoicm9vdCIsImlhdCI6MTc4MjU0NDIyOSwiZXhwIjozMzM0MDE0NDIyOX0.l-Aru4p4MXyS6teBgmJQKeS2SfhMCUPV3IGAf2zeYWE";
    const BASE_URL = "";
    const NOCOBASE_URL = "https://lht.gun.hmz.one";
    
    let currentTab = 'personal'; // 'personal' or 'business'
    let productsList = [];
    let selectedProduct = null;

    const headers = {
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json'
    };

    // Global Fetch Interceptor to route NocoBase API calls to local endpoints
    const originalFetch = window.fetch;
    window.fetch = async function(resource, init) {
      let url = typeof resource === 'string' ? resource : resource.url;
      
      if (url.startsWith('/api/') || url.includes('/api/')) {
        const urlPath = url.startsWith('http') ? new URL(url).pathname : url;
        const pathParts = urlPath.split('/');
        const endpoint = pathParts[pathParts.length - 1];
        
        // 1. FILE UPLOADS
        if (endpoint === 'attachments:create') {
          return originalFetch('/api/admin/upload', init);
        }
        
        // 2. SET IMAGE ASSOCIATION: Mock success
        if (endpoint.includes(':set')) {
          return new Response(JSON.stringify({ data: { success: true } }), {
            status: 200,
            headers: { 'Content-Type': 'application/json' }
          });
        }
        
        // 3. OTHER OPERATIONS
        const collection = currentTab === 'personal' ? 'personal_products' : 'business_products';
        
        // Handle Delete
        if (endpoint.includes(':destroy')) {
          const itemId = endpoint.split('/').pop() || '';
          return originalFetch(`/api/admin/config?tab=${collection}&id=${itemId}`, {
            method: 'DELETE',
            headers: init?.headers
          });
        }
        
        // Handle Update or Create
        if (endpoint.includes(':update') || endpoint.includes(':create')) {
          const bodyData = JSON.parse(init.body);
          
          // Inject attachment image inline
          const imgInput = document.getElementById('form-image-id');
          if (imgInput && imgInput.value) {
            const val = imgInput.value;
            if (val.startsWith('{')) {
              try {
                bodyData.image = [JSON.parse(val)];
              } catch(e) {}
            } else if (selectedProduct) {
              bodyData.image = selectedProduct.image || null;
            }
          }
          
          return originalFetch(`/api/admin/config?tab=${collection}`, {
            method: 'POST',
            headers: init.headers,
            body: JSON.stringify(bodyData)
          });
        }
        
        // Handle List
        if (endpoint.includes(':list')) {
          return originalFetch(`/api/admin/config?tab=${collection}`, { headers: init?.headers });
        }
      }
      
      return originalFetch(resource, init);
    };

    window.addEventListener('DOMContentLoaded', () => {
      fetchProducts();
    });

    async function fetchProducts() {
      const statusIndicator = document.getElementById('sync-status');
      statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-500/20 text-amber-300";
      statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span> Đang tải...';

      const collection = currentTab === 'personal' ? 'personal_products' : 'business_products';
      try {
        const res = await fetch(`${BASE_URL}/api/${collection}:list?sort=sort_order&appends=image`, { headers });
        if (!res.ok) throw new Error('API failed');
        const payload = await res.json();
        productsList = payload.data || [];
        renderProductList();
        
        statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/20 text-emerald-300";
        statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-400"></span> Đã đồng bộ NocoBase';
      } catch (err) {
        console.error(err);
        document.getElementById('product-list').innerHTML = '<div class="p-8 text-center text-rose-500 text-sm">Không thể kết nối đến NocoBase API</div>';
        statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-500/20 text-rose-300";
        statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-400"></span> Lỗi kết nối';
      }
    }

    function switchTab(tab) {
      if (currentTab === tab) return;
      currentTab = tab;
      
      const personalBtn = document.getElementById('tab-btn-personal');
      const businessBtn = document.getElementById('tab-btn-business');
      
      if (tab === 'personal') {
        personalBtn.className = "flex-1 py-2 px-3 rounded-lg text-sm font-semibold transition-all duration-200 bg-white text-oxford-blue shadow-sm";
        businessBtn.className = "flex-1 py-2 px-3 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-oxford-blue";
      } else {
        businessBtn.className = "flex-1 py-2 px-3 rounded-lg text-sm font-semibold transition-all duration-200 bg-white text-oxford-blue shadow-sm";
        personalBtn.className = "flex-1 py-2 px-3 rounded-lg text-sm font-semibold transition-all duration-200 text-slate-600 hover:text-oxford-blue";
      }
      
      cancelEdit();
      fetchProducts();
    }

    function renderProductList() {
      const listEl = document.getElementById('product-list');
      if (productsList.length === 0) {
        listEl.innerHTML = '<div class="p-8 text-center text-slate-400 text-sm">Chưa có sản phẩm nào</div>';
        return;
      }

      listEl.innerHTML = productsList.map(p => {
        const isSelected = selectedProduct && selectedProduct.id === p.id;
        const activeClass = isSelected 
          ? 'bg-oxford-blue text-white shadow-md' 
          : 'bg-white text-slate-800 hover:bg-slate-100 border border-slate-200';
        const badgeMarkup = p.badge 
          ? `<span class="px-1.5 py-0.5 text-[9px] font-bold rounded ${isSelected ? 'bg-white/20 text-white' : 'bg-blaze-orange/10 text-blaze-orange'}">${p.badge}</span>` 
          : '';
        const priceText = p.price || 'Liên hệ';
        const descText = p.description || 'Chưa có mô tả ngắn';

        return `
          <div onclick="selectProduct(${p.id})" class="p-3.5 rounded-xl cursor-pointer transition-all duration-200 flex flex-col gap-1.5 ${activeClass}">
            <div class="flex items-start justify-between gap-2">
              <span class="font-bold text-sm line-clamp-1">${p.name}</span>
              <div class="flex gap-1 items-center shrink-0">
                ${badgeMarkup}
                <span class="text-xs font-semibold ${isSelected ? 'text-slate-300' : 'text-slate-500'}">#${p.sort_order || 0}</span>
              </div>
            </div>
            <p class="text-xs line-clamp-1 opacity-75">${descText}</p>
            <div class="flex justify-between items-center mt-1 border-t border-dashed ${isSelected ? 'border-white/20' : 'border-slate-100'} pt-2">
              <span class="text-xs font-bold ${isSelected ? 'text-white' : 'text-blaze-orange'}">${priceText}</span>
              ${p.featured ? `<span class="text-[9px] font-bold uppercase tracking-wider ${isSelected ? 'text-emerald-300' : 'text-emerald-600'}">★ Nổi bật</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function selectProduct(id) {
      const p = productsList.find(item => item.id === id);
      if (!p) return;
      selectedProduct = p;
      
      renderProductList();

      document.getElementById('empty-state').classList.add('hidden');
      const form = document.getElementById('product-form');
      form.classList.remove('hidden');

      document.getElementById('form-id').value = p.id;
      document.getElementById('form-name').value = p.name || '';
      document.getElementById('form-price').value = p.price || '';
      document.getElementById('form-badge').value = p.badge || '';
      document.getElementById('form-tagline').value = p.tagline || '';
      document.getElementById('form-slug').value = p.slug || '';
      document.getElementById('form-description').value = p.description || '';
      document.getElementById('form-cta-label').value = p.cta_label || '';
      document.getElementById('form-theme').value = p.theme || 'light';
      document.getElementById('form-sort-order').value = p.sort_order || 0;
      document.getElementById('form-featured').checked = !!p.featured;

      // Handle Image
      const img = p.image?.[0];
      if (img) {
        document.getElementById('form-image-id').value = img.id;
        document.getElementById('image-preview-container').innerHTML = `<img src="${BASE_URL}${img.url}" alt="product image preview" class="object-cover w-full h-full">`;
        document.getElementById('btn-clear-image').classList.remove('hidden');
      } else {
        clearProductImage();
      }

      document.getElementById('btn-delete').classList.remove('hidden');

      const benefitsContainer = document.getElementById('benefits-container');
      benefitsContainer.innerHTML = '';
      
      const benefitsArray = p.benefits ? p.benefits.split('|') : [];
      if (benefitsArray.length === 0) {
        addBenefitRow('');
      } else {
        benefitsArray.forEach(b => addBenefitRow(b));
      }
    }

    function addBenefitRow(value) {
      const container = document.getElementById('benefits-container');
      const row = document.createElement('div');
      row.className = 'flex items-center gap-2 benefit-row';
      row.innerHTML = `
        <input type="text" value="${value.replace(/"/g, '&quot;')}" placeholder="Nhập một quyền lợi..." class="flex-1 px-3 py-1.5 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">
        <button type="button" onclick="this.parentElement.remove()" class="text-rose-500 hover:text-rose-600 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        </button>
      `;
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }

    // Image Upload Handler
    async function uploadProductImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const statusIndicator = document.getElementById('sync-status');
      statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-500/20 text-amber-300";
      statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span> Đang tải ảnh lên...';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch(`${BASE_URL}/api/attachments:create`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${TOKEN}`
            // Note: Don't set Content-Type header when uploading FormData
          },
          body: formData
        });

        if (!res.ok) throw new Error('Upload failed');
        const payload = await res.json();
        const fileData = payload.data || {};
        
        document.getElementById('form-image-id').value = JSON.stringify(fileData);
        document.getElementById('image-preview-container').innerHTML = `<img src="${BASE_URL}${fileData.url}" alt="uploaded preview" class="object-cover w-full h-full">`;
        document.getElementById('btn-clear-image').classList.remove('hidden');

        statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/20 text-emerald-300";
        statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-400"></span> Đã tải ảnh xong';
      } catch (err) {
        console.error(err);
        alert('Tải ảnh thất bại.');
        statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-500/20 text-rose-300";
        statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-400"></span> Lỗi tải ảnh';
      }
    }

    function clearProductImage() {
      document.getElementById('form-image-id').value = '';
      document.getElementById('image-file-input').value = '';
      document.getElementById('image-preview-container').innerHTML = `<span class="text-[10px] text-slate-400 font-bold uppercase text-center p-1">Chưa có hình</span>`;
      document.getElementById('btn-clear-image').classList.add('hidden');
    }

    function initNewProduct() {
      selectedProduct = null;
      renderProductList();

      document.getElementById('empty-state').classList.add('hidden');
      const form = document.getElementById('product-form');
      form.classList.remove('hidden');

      form.reset();
      document.getElementById('form-id').value = '';
      document.getElementById('form-featured').checked = false;
      clearProductImage();
      document.getElementById('btn-delete').classList.add('hidden');

      const container = document.getElementById('benefits-container');
      container.innerHTML = '';
      addBenefitRow('');
    }

    function cancelEdit() {
      selectedProduct = null;
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('product-form').classList.add('hidden');
      renderProductList();
    }

    async function saveProduct(e) {
      e.preventDefault();
      const statusIndicator = document.getElementById('sync-status');
      statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-500/20 text-amber-300";
      statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span> Đang lưu...';

      const benefitRows = document.querySelectorAll('.benefit-row input');
      const benefitsListArray = [];
      benefitRows.forEach(input => {
        const val = input.value.trim();
        if (val) benefitsListArray.push(val);
      });
      const benefitsString = benefitsListArray.join('|');

      const id = document.getElementById('form-id').value;
      const data = {
        name: document.getElementById('form-name').value.trim(),
        price: document.getElementById('form-price').value.trim(),
        badge: document.getElementById('form-badge').value.trim(),
        tagline: document.getElementById('form-tagline').value.trim(),
        slug: document.getElementById('form-slug').value.trim(),
        description: document.getElementById('form-description').value.trim(),
        benefits: benefitsString,
        cta_label: document.getElementById('form-cta-label').value.trim(),
        theme: document.getElementById('form-theme').value,
        sort_order: parseInt(document.getElementById('form-sort-order').value) || 0,
        featured: document.getElementById('form-featured').checked,
      };

      const collection = currentTab === 'personal' ? 'personal_products' : 'business_products';
      const url = id 
        ? `${BASE_URL}/api/${collection}:update/${id}`
        : `${BASE_URL}/api/${collection}:create`;

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify(data)
        });

        if (!res.ok) throw new Error('Save failed');
        const responseJson = await res.json();
        const savedRecord = responseJson.data?.[0] || responseJson.data || {};
        const savedRecordId = savedRecord.id || id;

        // Save relationship for Image
        const imageId = document.getElementById('form-image-id').value;
        const linkUrl = `${BASE_URL}/api/${collection}/${savedRecordId}/image:set`;
        
        await fetch(linkUrl, {
          method: 'POST',
          headers,
          body: JSON.stringify(imageId ? [parseInt(imageId)] : [])
        });

        cancelEdit();
        await fetchProducts();
      } catch (err) {
        console.error(err);
        alert('Lưu thất bại.');
        statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-500/20 text-rose-300";
        statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-400"></span> Lỗi lưu dữ liệu';
      }
    }

    async function deleteCurrentProduct() {
      const id = document.getElementById('form-id').value;
      if (!id) return;
      if (!confirm('Bạn có chắc chắn muốn xóa sản phẩm này khỏi NocoBase không?')) return;

      const statusIndicator = document.getElementById('sync-status');
      statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-500/20 text-amber-300";
      statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span> Đang xóa...';

      const collection = currentTab === 'personal' ? 'personal_products' : 'business_products';
      try {
        const res = await fetch(`${BASE_URL}/api/${collection}:destroy/${id}`, {
          method: 'POST',
          headers
        });
        if (!res.ok) throw new Error('Destroy failed');
        
        cancelEdit();
        await fetchProducts();
      } catch (err) {
        console.error(err);
        alert('Xóa thất bại.');
        statusIndicator.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-500/20 text-rose-300";
        statusIndicator.innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-400"></span> Lỗi xóa';
      }
    }
  </script>
</body>
</html>
