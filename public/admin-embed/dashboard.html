<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Chống Google index trang này -->
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>LHT Website Command Center</title>
  <meta name="description" content="Trung tâm điều khiển và quản trị nội dung website Linh Hoa Tâm">

<body class="p-4 bg-slate-50 min-h-screen flex flex-col justify-between">
  <div class="w-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col max-w-[1280px] mx-auto">
    <!-- Header -->
    <div class="bg-gradient-to-r from-oxford-blue to-[#004080] p-5 text-white flex items-center justify-between shrink-0">
      <div>
        <h1 class="text-xl font-title font-bold tracking-tight">TRANG QUẢN TRỊ TỔNG HỢP (WEBSITE COMMAND CENTER)</h1>
        <p class="text-[11px] text-slate-300 mt-0.5 font-medium">Bản điều khiển tập trung để quản lý toàn bộ nội dung & hình ảnh website Linh Hoa Tâm</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="sync-status" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/20 text-emerald-300">
          <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
          NocoBase Live Connected
        </span>
      </div>
    </div>

    <!-- Dashboard Content Layout -->
    <div class="flex flex-col lg:flex-row min-h-[640px] max-h-[750px] overflow-hidden">
      <!-- Sidebar Navigation -->
      <div class="w-full lg:w-[240px] bg-slate-50/50 border-r border-slate-200 p-4 flex flex-col gap-1.5 shrink-0 overflow-y-auto custom-scroll">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-3 mb-1">Cấu hình chung</span>
        <button onclick="switchTab('homepage')" id="menu-homepage" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 bg-oxford-blue text-white shadow-sm w-full text-left">

        </button>
        <button onclick="switchTab('images')" id="menu-images" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        </button>

        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-3 mt-4 mb-1">Sản phẩm & Dịch vụ</span>
        <button onclick="switchTab('personal_products')" id="menu-personal_products" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        </button>
        <button onclick="switchTab('business_products')" id="menu-business_products" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        <button onclick="switchTab('customer_screenshots')" id="menu-customer_screenshots" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        <button onclick="switchTab('facebook_posts')" id="menu-facebook_posts" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        <button onclick="switchTab('leads')" id="menu-leads" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">
          📥 Đăng ký từ Web (Leads)
        </button>
        <button onclick="switchTab('speaker_events')" id="menu-speaker_events" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        <button onclick="switchTab('speaker_assets')" id="menu-speaker_assets" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        </button>

        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider px-3 mt-4 mb-1">Thành phần phụ</span>
        <button onclick="switchTab('stats')" id="menu-stats" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">

        </button>
        <button onclick="switchTab('partners')" id="menu-partners" class="flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left">
          🤝 Logo Đối tác
        </button>
      </div>

      <!-- Main Panel Work Area -->
      <div class="flex-grow p-6 bg-white overflow-y-auto custom-scroll" id="work-area">
        <!-- Dyn contents loaded here -->
      </div>
    </div>
  </div>

  <div class="text-center text-[10px] text-slate-400 font-medium py-2">
    Đảm bảo an toàn SEO & Disallowed index bởi Robots.txt
  </div>

  <!-- Command Center Script Core -->
  <script>
    // 🔒 LỚP BẢO MẬT: CHỈ CHO PHÉP CHẠY BÊN TRONG IFRAME CỦA NOCOBASE
    (function checkSecurityLock() {
      const isEmbedded = window.self !== window.top;
      const ref = document.referrer || "";
      const isAllowedOrigin = ref.includes("lht.gun.hmz.one") || ref.includes("localhost") || ref.includes("127.0.0.1");
      
      if (!isEmbedded || !isAllowedOrigin) {
        document.body.innerHTML = `
          <div class="min-h-screen bg-slate-100 flex flex-col items-center justify-center p-6 text-center">
            <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md border border-slate-200">
              <span class="text-4xl">🔒</span>
              <div role="heading" aria-level="1" class="text-lg font-title font-bold text-slate-800 mt-4 mb-2">TRUY CẬP BỊ TỪ CHỐI</div>
              <p class="text-xs text-slate-500 leading-relaxed">Trang quản trị này chứa token hệ thống và chỉ được phép hoạt động khi nhúng (iframe) bên trong NocoBase của Linh Hoa Tâm. Truy cập trực tiếp bị từ chối vì lý do bảo mật.</p>
            </div>
          </div>
        `;
        throw new Error("Security Lock: Access denied outside allowed NocoBase origin.");
      }
    })();

    const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsInJvbGVOYW1lIjoicm9vdCIsImlhdCI6MTc4MjU0NDIyOSwiZXhwIjozMzM0MDE0NDIyOX0.l-Aru4p4MXyS6teBgmJQKeS2SfhMCUPV3IGAf2zeYWE";
    const BASE_URL = "";
    const NOCOBASE_URL = "https://lht.gun.hmz.one";
    
    let activeTab = 'homepage';
    let profileData = null;
    let listData = [];
    let selectedItem = null;

    const headers = {
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json'
    };

    // Global Fetch Interceptor to route NocoBase API calls to local endpoints (except leads)
    const originalFetch = window.fetch;
    window.fetch = async function(resource, init) {
      let url = typeof resource === 'string' ? resource : resource.url;
      
      if (url.startsWith('/api/') || url.includes('/api/')) {
        const urlPath = url.startsWith('http') ? new URL(url).pathname : url;
        const pathParts = urlPath.split('/');
        const endpoint = pathParts[pathParts.length - 1];
        
        // 1. LEADS: Redirect to remote NocoBase URL
        if (endpoint.includes('leads')) {
          const remoteUrl = `${NOCOBASE_URL}${urlPath}${url.includes('?') ? '?' + url.split('?')[1] : ''}`;
          return originalFetch(remoteUrl, init);
        }
        
        // 2. FILE UPLOADS: Redirect to local upload API
        if (endpoint === 'attachments:create') {
          return originalFetch('/api/admin/upload', init);
        }
        
        // 3. SET IMAGE ASSOCIATION: Mock success since we store attachments inline
        if (endpoint.includes(':set')) {
          return new Response(JSON.stringify({ data: { success: true } }), {
            status: 200,
            headers: { 'Content-Type': 'application/json' }
          });
        }
        
        // 4. HOMEPAGE/PROFILE CONFIG
        if (endpoint.startsWith('profile:list')) {
          const localRes = await originalFetch('/api/admin/config?tab=homepage', { headers: init?.headers });
          const localData = await localRes.json();
          return new Response(JSON.stringify({ data: [localData.data] }), {
            status: 200,
            headers: { 'Content-Type': 'application/json' }
          });
        }
        
        if (endpoint.startsWith('profile:update')) {
          const bodyData = JSON.parse(init.body);
          return originalFetch('/api/admin/config?tab=homepage', {
            method: 'POST',
            headers: init.headers,
            body: JSON.stringify(bodyData)
          });
        }
        
        // 5. OTHER COLLECTIONS (GET, POST, DELETE)
        // Handle Delete/Destroy
        if (endpoint.includes(':destroy')) {
          const tabName = endpoint.split(':')[0];
          const itemId = endpoint.split('/').pop() || '';
          return originalFetch(`/api/admin/config?tab=${tabName}&id=${itemId}`, {
            method: 'DELETE',
            headers: init?.headers
          });
        }
        
        // Handle Update or Create
        if (endpoint.includes(':update') || endpoint.includes(':create')) {
          const tabName = endpoint.split(':')[0];
          const bodyData = JSON.parse(init.body);
          
          const imageField = tabName === 'facebook_posts' ? 'thumbnail' : 'image';
          const imgInput = document.getElementById('edit-image-id');
          if (imgInput && imgInput.value) {
            const val = imgInput.value;
            if (val.startsWith('{')) {
              try {
                bodyData[imageField] = [JSON.parse(val)];
              } catch(e) {}
            } else if (selectedItem) {
              bodyData[imageField] = selectedItem[imageField] || null;
            }
          }
          
          return originalFetch(`/api/admin/config?tab=${tabName}`, {
            method: 'POST',
            headers: init.headers,
            body: JSON.stringify(bodyData)
          });
        }
        
        // Handle Listing
        if (endpoint.includes(':list')) {
          const tabName = endpoint.split(':')[0];
          return originalFetch(`/api/admin/config?tab=${tabName}`, { headers: init?.headers });
        }
      }
      
      return originalFetch(resource, init);
    };

    window.addEventListener('DOMContentLoaded', () => {
      switchTab('homepage');
    });

    function setSyncStatus(status, text) {
      const el = document.getElementById('sync-status');
      if (status === 'syncing') {
        el.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-500/20 text-amber-300";
        el.innerHTML = '<span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span> ' + text;
      } else if (status === 'success') {
        el.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500/20 text-emerald-300";
        el.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-400"></span> ' + text;
      } else {
        el.className = "inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-500/20 text-rose-300";
        el.innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-400"></span> ' + text;
      }
    }

    function switchTab(tab) {
      // Update sidebar styling
      const menuIds = ['homepage', 'images', 'personal_products', 'business_products', 'testimonials', 'customer_screenshots', 'facebook_posts', 'leads', 'stats', 'partners', 'speaker_events', 'speaker_assets'];
      menuIds.forEach(id => {
        const el = document.getElementById('menu-' + id);
        if (id === tab) {
          el.className = "flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 bg-oxford-blue text-white shadow-sm w-full text-left";
        } else {
          el.className = "flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 text-slate-600 hover:bg-slate-100 w-full text-left";
        }
      });

      activeTab = tab;
      selectedItem = null;
      loadTabData();
    }

    async function loadTabData() {
      setSyncStatus('syncing', 'Đang tải dữ liệu...');
      const area = document.getElementById('work-area');
      
      if (activeTab === 'homepage') {
        await loadHomepageConfig(area);
      } else if (activeTab === 'images') {
        await loadImagesConfig(area);
      } else if (activeTab === 'speaker_assets') {
        await loadSpeakerAssetsConfig(area);
      } else {
        await loadCollectionConfig(area);
      }
    }

    // ─────────────────────────────────────────────────────────────
    // 1. Homepage Config (Profile Collection)
    // ─────────────────────────────────────────────────────────────
    async function loadHomepageConfig(area) {
      try {
        const res = await fetch(`${BASE_URL}/api/profile:list`, { headers });
        const payload = await res.json();
        profileData = payload.data?.[0] || null;
        
        if (!profileData) {
          area.innerHTML = '<div class="text-center text-slate-400 py-10">Không tìm thấy record cấu hình profile ID 1</div>';
          return;
        }

        area.innerHTML = `
          <div class="max-w-3xl">
            <h2 class="font-title font-bold text-lg text-oxford-blue mb-2">🏠 CẤU HÌNH NỘI DUNG TRANG CHỦ & WORKSHOP</h2>
            <p class="text-xs text-slate-400 mb-6">Thay đổi trực tiếp nội dung chính trên trang chủ. Bấm lưu để đồng bộ lên website.</p>
            
            <form onsubmit="saveHomepage(event)" class="space-y-5">
              <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Tiêu đề chính (Hero Title) - Nhấn Enter để xuống dòng</label>
                <textarea id="hp-hero-title" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">${profileData.hero_title || ''}</textarea>
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Mô tả chính (Hero Description)</label>
                <textarea id="hp-hero-desc" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">${profileData.hero_desc || ''}</textarea>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-slate-100">
                <div>
                  <h3 class="text-xs font-black text-blaze-orange uppercase tracking-wider mb-3">Cấu hình banner Workshop</h3>
                  <div class="space-y-3">
                    <div>
                      <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tiêu đề Workshop - Nhấn Enter để xuống dòng</label>
                      <textarea id="hp-workshop-title" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">${profileData.workshop_title || ''}</textarea>
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Mô tả ngắn</label>
                      <textarea id="hp-workshop-desc" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">${profileData.workshop_desc || ''}</textarea>
                    </div>
                  </div>
                </div>

                <div>
                  <h3 class="text-xs font-black text-blaze-orange uppercase tracking-wider mb-3">Cấu hình banner Cộng đồng</h3>
                  <div class="space-y-3">
                    <div>
                      <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tiêu đề Cộng đồng - Nhấn Enter để xuống dòng</label>
                      <textarea id="hp-community-title" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">${profileData.community_title || ''}</textarea>
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Mô tả ngắn</label>
                      <textarea id="hp-community-desc" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">${profileData.community_desc || ''}</textarea>
                    </div>
                  </div>
                </div>
              </div>

              <div class="pt-4 border-t border-slate-100 flex justify-end">
                <button type="submit" class="bg-blaze-orange hover:bg-blaze-orange/95 text-white font-bold text-xs px-6 py-2.5 rounded-xl transition-all duration-200">
                  Lưu cấu hình nội dung
                </button>
              </div>
            </form>
          </div>
        `;
        setSyncStatus('success', 'Đã tải cấu hình trang chủ');
      } catch (err) {
        setSyncStatus('error', 'Lỗi tải profile');
      }
    }

    async function saveHomepage(e) {
      e.preventDefault();
      setSyncStatus('syncing', 'Đang lưu nội dung...');
      const data = {
        hero_title: document.getElementById('hp-hero-title').value.trim(),
        hero_desc: document.getElementById('hp-hero-desc').value.trim(),
        workshop_title: document.getElementById('hp-workshop-title').value.trim(),
        workshop_desc: document.getElementById('hp-workshop-desc').value.trim(),
        community_title: document.getElementById('hp-community-title').value.trim(),
        community_desc: document.getElementById('hp-community-desc').value.trim(),
      };

      try {
        const res = await fetch(`${BASE_URL}/api/profile:update/${profileData.id}`, {
          method: 'POST',
          headers,
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('Save failed');
        setSyncStatus('success', 'Đã lưu cấu hình thành công!');
        setTimeout(loadTabData, 1500);
      } catch (err) {
        alert('Lưu thất bại');
        setSyncStatus('error', 'Lỗi lưu cấu hình');
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Speaker Config (Speaker Assets)
    // ─────────────────────────────────────────────────────────────
    let speakerAssetsData = null;

    async function loadSpeakerAssetsConfig(area) {
      try {
        const res = await fetch('/api/admin/config?tab=speaker_assets', { headers });
        const payload = await res.json();
        speakerAssetsData = payload.data || {};

        area.innerHTML = `
          <div class="max-w-3xl">
            <h2 class="font-title font-bold text-lg text-oxford-blue mb-2">🔗 CẤU HÌNH FILE, LINKS & PROPOSAL DIỄN GIẢ</h2>
            <p class="text-xs text-slate-400 mb-6">Quản lý trực tiếp các liên kết tài liệu diễn giả, tệp tin và các tùy chọn biểu mẫu mời.</p>
            
            <form onsubmit="saveSpeakerAssets(event)" class="space-y-5">
              <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Link Hồ Sơ Năng Lực (Credential PDF) *</label>
                <input type="text" id="sa-pdf-url" required class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue" value="${speakerAssetsData.credential_pdf_url || ''}">
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Link Proposal Diễn Giả (Slide đề xuất)</label>
                <input type="text" id="sa-proposal-url" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue" value="${speakerAssetsData.proposal_url || ''}">
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-600 uppercase mb-1.5">Tùy chọn Chuyên đề Form đặt lịch (Mỗi chuyên đề một dòng)</label>
                <textarea id="sa-topics-options" rows="6" placeholder="Nhập các chủ đề cách nhau bằng dòng mới..." class="w-full px-3 py-2 border border-slate-300 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-oxford-blue">${(speakerAssetsData.topics_options || []).join('\n')}</textarea>
              </div>

              <div class="pt-4 border-t border-slate-100 flex justify-end">
                <button type="submit" class="bg-blaze-orange hover:bg-blaze-orange/95 text-white font-bold text-xs px-6 py-2.5 rounded-xl transition-all duration-200">
                  Lưu cấu hình Speaker
                </button>
              </div>
            </form>
          </div>
        `;
        setSyncStatus('success', 'Đã tải cấu hình Speaker');
      } catch (err) {
        setSyncStatus('error', 'Lỗi tải cấu hình Speaker');
      }
    }

    async function uploadImageField(event, fieldName) {
      const file = event.target.files[0];
      if (!file) return;
      setSyncStatus('syncing', 'Đang tải ảnh ' + fieldName + '...');
      
      const formData = new FormData();
      formData.append('file', file);

      try {
        const uploadRes = await fetch(`${BASE_URL}/api/attachments:create`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${TOKEN}` },
          body: formData
        });
        if (!uploadRes.ok) throw new Error('Upload failed');
        const payload = await uploadRes.json();
        const fileId = payload.data?.id;

        const linkRes = await fetch(`${BASE_URL}/api/profile/${profileData.id}/${fieldName}:set`, {
          method: 'POST',
          headers,
          body: JSON.stringify([fileId])
        });
        if (!linkRes.ok) throw new Error('Link failed');
        
        setSyncStatus('success', 'Đã tải ảnh lên thành công!');
        setTimeout(loadTabData, 1000);
      } catch (err) {
        alert('Tải ảnh thất bại');
        setSyncStatus('error', 'Lỗi tải ảnh');
      }
    }

    function renderItemListMarkup() {
      if (listData.length === 0) return '<div class="text-center py-10 text-xs text-slate-400">Danh sách trống</div>';
      
      return listData.map((item, idx) => {
        let title = item.name || item.title || item.label || item.caption || `Mục số ${idx + 1}`;
        let sub = item.price || item.position || item.value || (item.visible === false ? 'Bị ẩn' : 'Hiển thị');
        let suffix = `<span class="text-[10px] font-bold text-slate-400">#${item.sort_order || 0}</span>`;
        
        if (activeTab === 'partners') {
          title = item.name || 'Đối tác';
          sub = `Thứ tự #${item.sort_order || 0}`;
        } else if (activeTab === 'leads') {
          title = item.name || 'Khách hàng';
          sub = item.phone || item.email || 'Không có SĐT';
          const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleDateString('vi-VN') : '';
          suffix = `<span class="text-[9px] text-slate-400 font-medium">${dateStr}</span>`;
        }
        
        return `
          <div onclick="selectItem(${item.id})" class="p-3 border rounded-xl bg-white hover:bg-slate-100 cursor-pointer flex items-center justify-between text-xs transition-colors shadow-sm">
            <div class="min-w-0 flex-grow pr-2">
              <div class="font-bold text-slate-800 truncate">${title}</div>
              <div class="text-[10px] text-slate-400 mt-0.5 truncate">${sub}</div>
            </div>
            ${suffix}
          </div>
        `;
      }).join('');
    }

    // Upload Item Image (Upload to NocoBase and update local preview)
    async function uploadItemImage(event, fileField, previewContainerId) {
      const file = event.target.files[0];
      if (!file) return;
      setSyncStatus('syncing', 'Đang tải tệp lên...');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch(`${BASE_URL}/api/attachments:create`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${TOKEN}` },
          body: formData
        });
        if (!res.ok) throw new Error('Upload failed');
        const payload = await res.json();
        const fileData = payload.data || {};

        if (fileField === 'logo_url') {
          document.getElementById('edit-logo-url').value = fileData.url;
        } else {
          document.getElementById('edit-image-id').value = JSON.stringify(fileData);
        }

        const previewEl = document.getElementById(previewContainerId);
        
        if (previewContainerId.includes('avatar')) {
          previewEl.innerHTML = `<img src="${BASE_URL}${fileData.url}" class="object-cover w-full h-full" alt="preview">`;
        } else {
          previewEl.innerHTML = `<img src="${BASE_URL}${fileData.url}" class="object-contain max-h-full max-w-full" alt="preview">`;
        }
        
        setSyncStatus('success', 'Đã upload tệp thành công');
      } catch (err) {
        alert('Tải tệp lên thất bại');
        setSyncStatus('error', 'Lỗi upload');
      }
    }

    function clearItemImage(fileField, previewContainerId) {
      if (fileField === 'logo_url') {
        document.getElementById('edit-logo-url').value = '';
      } else {
        document.getElementById('edit-image-id').value = '';
      }
      const previewEl = document.getElementById(previewContainerId);
      previewEl.innerHTML = `<span class="text-[8px] text-slate-400">Chưa có ảnh</span>`;
    }

    function cancelEdit() {
      selectedItem = null;
      loadTabData();
    }

    // ─────────────────────────────────────────────────────────────
    // 5. Save and Delete Actions
    // ─────────────────────────────────────────────────────────────
    async function saveItem(e) {
      e.preventDefault();
      
      if (activeTab === 'leads') {
        alert('Dữ liệu khách hàng đăng ký chỉ được quyền xem và xóa, không thể chỉnh sửa.');
        return;
      }
      
      setSyncStatus('syncing', 'Đang lưu dữ liệu lên NocoBase...');

      const id = selectedItem ? selectedItem.id : null;
      let data = {};
      
      // Build request body depending on activeTab
      if (['personal_products', 'business_products'].includes(activeTab)) {
        const benefitRows = document.querySelectorAll('.edit-benefit-row input');
        const benefitsArr = [];
        benefitRows.forEach(input => {
          const v = input.value.trim();
          if (v) benefitsArr.push(v);
        });
        
        data = {
          name: document.getElementById('edit-name').value.trim(),
          price: document.getElementById('edit-price').value.trim(),
          badge: document.getElementById('edit-badge').value.trim(),
          tagline: document.getElementById('edit-tagline').value.trim(),
          slug: document.getElementById('edit-slug').value.trim(),
          description: document.getElementById('edit-description').value.trim(),
          benefits: benefitsArr.join('|'),
          cta_label: document.getElementById('edit-cta-label').value.trim(),
          theme: document.getElementById('edit-theme').value,
          sort_order: parseInt(document.getElementById('edit-sort-order').value) || 0,
          featured: document.getElementById('edit-featured').checked,
        };
      } 
      else if (activeTab === 'testimonials') {
        data = {
          name: document.getElementById('edit-name').value.trim(),
          position: document.getElementById('edit-position').value.trim(),
          company: document.getElementById('edit-company').value.trim(),
          quote: document.getElementById('edit-quote').value.trim(),
          category: document.getElementById('edit-category').value,
          rating: parseInt(document.getElementById('edit-rating').value) || 5,
          sort_order: parseInt(document.getElementById('edit-sort-order').value) || 0,
        };
      }
      else if (activeTab === 'speaker_events') {
        data = {
          title: document.getElementById('edit-title').value.trim(),
          location: document.getElementById('edit-location').value.trim(),
          sort_order: parseInt(document.getElementById('edit-sort-order').value) || 0,
        };
      }
      else if (activeTab === 'customer_screenshots') {
        data = {
          caption: document.getElementById('edit-caption').value.trim(),
          visible: document.getElementById('edit-visible').checked,
          sort_order: parseInt(document.getElementById('edit-sort-order').value) || 0,
        };
      } 
      else if (activeTab === 'facebook_posts') {
        data = {
          title: document.getElementById('edit-title').value.trim(),
          post_url: document.getElementById('edit-post-url').value.trim(),
          excerpt: document.getElementById('edit-excerpt').value.trim(),
          status: document.getElementById('edit-status').value,
          sort_order: parseInt(document.getElementById('edit-sort-order').value) || 0,
        };
      } 
      else if (activeTab === 'stats') {
        data = {
          value: document.getElementById('edit-value').value.trim(),
          label: document.getElementById('edit-label').value.trim(),
          subLabel: document.getElementById('edit-subLabel').value.trim(),
          sort_order: parseInt(document.getElementById('edit-sort-order').value) || 0,
        };
      } 
      else if (activeTab === 'partners') {
        data = {
          name: document.getElementById('edit-name').value.trim(),
          logo_url: document.getElementById('edit-logo-url').value.trim(),
          sort_order: parseInt(document.getElementById('edit-sort-order').value) || 0,
        };
      }

      // Determine API URL
      const url = id 
        ? `${BASE_URL}/api/${activeTab}:update/${id}`
        : `${BASE_URL}/api/${activeTab}:create`;

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers,
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('Save record failed');
        
        const payload = await res.json();
        const savedRecord = payload.data?.[0] || payload.data || {};
        const savedRecordId = savedRecord.id || id;

        // Save Image attachment association if field edit-image-id exists
        const imgInput = document.getElementById('edit-image-id');
        if (imgInput && activeTab !== 'partners') {
          const imageId = imgInput.value;
          const imageField = activeTab === 'facebook_posts' ? 'thumbnail' : 'image';
          const linkUrl = `${BASE_URL}/api/${activeTab}/${savedRecordId}/${imageField}:set`;
          
          await fetch(linkUrl, {
            method: 'POST',
            headers,
            body: JSON.stringify(imageId ? [parseInt(imageId)] : [])
          });
        }

        setSyncStatus('success', 'Đã lưu thay đổi thành công!');
        selectedItem = null;
        setTimeout(loadTabData, 1000);
      } catch (err) {
        alert('Lưu thất bại');
        setSyncStatus('error', 'Lỗi lưu dữ liệu');
      }
    }

    async function deleteCurrentItem() {
      if (!selectedItem) return;
      if (!confirm('Bạn có chắc chắn muốn xóa mục này khỏi NocoBase?')) return;
      setSyncStatus('syncing', 'Đang xóa...');

      try {
        const res = await fetch(`${BASE_URL}/api/${activeTab}:destroy/${selectedItem.id}`, {
          method: 'POST',
          headers
        });
        if (!res.ok) throw new Error('Destroy failed');
        setSyncStatus('success', 'Đã xóa mục thành công!');
        selectedItem = null;
        setTimeout(loadTabData, 1000);
      } catch (err) {
        alert('Xóa thất bại');
        setSyncStatus('error', 'Lỗi xóa');
      }
    }


  </script>
</body>
</html>
